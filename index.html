<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>🧪 HSE Alcohol Test System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button {
  background:#2563eb;
  color:white;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #334155;
  padding:6px;
  font-size:12px;
}

.pass { background:green; }
.fail { background:red; }

.footer {
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-top:20px;
}
</style>

</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox" class="card">
  <h2>🔐 HSE Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none;">

<div class="card">
  <h2>🧪 HSE Alcohol Test System</h2>
</div>

<div class="grid">

  <div class="card">
    <h3>👷 Worker</h3>

    <input id="name" placeholder="Nama">
    <input id="phone" placeholder="No HP">
    <input id="dept" placeholder="Department">

    <button onclick="saveWorker()">Save Worker</button>

    <div id="workerList"></div>
  </div>

  <div class="card">
    <h3>🧪 Test</h3>

    <select id="workerSelect"></select>
    <input id="bac" placeholder="Value (0 = PASS, >0 = FAIL)">

    <button onclick="submitTest()">Submit Test</button>
  </div>

</div>

<!-- HISTORY -->
<div class="card">
  <h3>📊 History</h3>
  <button onclick="loadData()">Refresh</button>
  <div id="history"></div>
</div>

<!-- KPI -->
<div class="card">
  <h3>📈 KPI Dashboard</h3>
  <div id="kpiBox"></div>
</div>

<div class="footer">
Powered by Pausbiru7
</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5UI9G0sQIFgiw6Zt88fdoLM3jwtMUqfFeo6rdGqqo4uNGKE_9Jmd1lXTGUJi4qFeq8w/exec";

const API_KEY = "HSE-ALCOHOL-2026";

let workers = [];
let isLoading = false;

/* ================= LOGIN ================= */
function login(){

  const u = user.value;
  const p = pass.value;

  if(u==="admin" && p==="admin123"){
    loginBox.style.display="none";
    app.style.display="block";
    loadData();
  } else {
    alert("Login gagal");
  }
}

/* ================= LOAD DATA ================= */
function loadData(){

  if(isLoading) return;
  isLoading = true;

  fetch(`${API}?key=${API_KEY}`)
  .then(r => r.json())
  .then(data => {

    workers = data.workers || [];

    renderWorkers();
    renderDropdown();
    renderHistory(data.tests || []);
    renderKPI(data.tests || []);

    isLoading = false;
  })
  .catch(err => {
    console.log("LOAD ERROR:", err);
    isLoading = false;
  });
}

/* ================= SAVE WORKER (FIXED) ================= */
function saveWorker(){

  const payload = {
    key: API_KEY,
    action: "worker_save",
    name: name.value,
    phone: phone.value,
    department: dept.value
  };

  console.log("SEND WORKER:", payload);

  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(res => {
    console.log("WORKER RESPONSE:", res);
    loadData();
  })
  .catch(err => console.log("WORKER ERROR:", err));
}

/* ================= SAVE TEST (FIXED) ================= */
function submitTest(){

  const payload = {
    key: API_KEY,
    action: "test_insert",
    worker_id: workers[workerSelect.value]?.name,
    bac: bac.value
  };

  console.log("SEND TEST:", payload);

  fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(res => {
    console.log("TEST RESPONSE:", res);
    loadData();
  })
  .catch(err => console.log("TEST ERROR:", err));
}

/* ================= RENDER WORKERS ================= */
function renderWorkers(){

  workerList.innerHTML =
  "<table><tr><th>Name</th><th>Phone</th></tr>" +
  workers.map(w =>
    `<tr><td>${w.name}</td><td>${w.phone}</td></tr>`
  ).join("") +
  "</table>";
}

/* ================= DROPDOWN ================= */
function renderDropdown(){

  workerSelect.innerHTML =
  workers.map((w,i)=>
    `<option value="${i}">${w.name}</option>`
  ).join("");
}

/* ================= HISTORY (PASS/FAIL RULE) ================= */
function renderHistory(data){

  history.innerHTML =
  "<table><tr><th>Name</th><th>Value</th><th>Status</th></tr>" +

  data.map(t => {

    const status = (parseFloat(t.bac) === 0) ? "PASS" : "FAIL";

    return `
      <tr class="${status==='FAIL'?'fail':'pass'}">
        <td>${t.name}</td>
        <td>${t.bac}</td>
        <td>${status}</td>
      </tr>
    `;
  }).join("") +

  "</table>";
}

/* ================= KPI ENGINE ================= */
function renderKPI(data){

  let pass = 0;
  let fail = 0;

  data.forEach(t => {

    const status = (parseFloat(t.bac) === 0) ? "PASS" : "FAIL";

    if(status === "PASS") pass++;
    else fail++;
  });

  const total = data.length;
  const compliance = total ? ((pass/total)*100).toFixed(2) : 0;

  kpiBox.innerHTML = `
    <table>
      <tr><th>Total</th><th>PASS</th><th>FAIL</th><th>Compliance</th></tr>
      <tr>
        <td>${total}</td>
        <td>${pass}</td>
        <td>${fail}</td>
        <td>${compliance}%</td>
      </tr>
    </table>
  `;
}

/* ================= PWA (OPTIONAL) ================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
  .then(() => console.log("SW OK"))
  .catch(err => console.log("SW ERROR", err));
}

</script>

</body>
</html>
