<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🧪 HSE Alcohol Test System</title>

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.header {
  margin-bottom:15px;
}

.subtitle {
  font-size:12px;
  opacity:0.7;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button {
  background:#2563eb;
  color:white;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th {
  border:1px solid #334155;
  padding:6px;
  font-size:12px;
}

.pass { background:green; }
.fail { background:red; }

/* FOOTER */
.footer {
  margin-top:20px;
  text-align:center;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>🧪 HSE Alcohol Test System</h2>
  <div class="subtitle">Real-time Workforce Compliance & Safety Monitoring</div>
</div>

<div class="grid">

<!-- WORKER -->
<div class="card">
<h3>👷 Worker Management</h3>

<input id="name" placeholder="👤 Nama">
<input id="phone" placeholder="📱 No HP (WA)">
<input id="dept" placeholder="🏭 Department">

<button onclick="saveWorker()">💾 Save Worker</button>

<h4>📋 Worker List</h4>
<div id="workerList"></div>
</div>

<!-- TEST -->
<div class="card">
<h3>🧪 Alcohol Test Input</h3>

<select id="workerSelect"></select>

<input id="bac" placeholder="🍺 BAC Value">

<button onclick="submitTest()">🚀 Submit Test</button>
</div>

</div>

<!-- HISTORY -->
<div class="card" style="margin-top:15px;">
<h3>📊 Test History</h3>
<button onclick="loadData()">🔄 Refresh</button>
<div id="history"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  Powered by Pausbiru7
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx5UI9G0sQIFgiw6Zt88fdoLM3jwtMUqfFeo6rdGqqo4uNGKE_9Jmd1lXTGUJi4qFeq8w/exec";
const API_KEY = "HSE-ALCOHOL-2026";

let workers = [];

/* =========================
   LOAD DATA
========================= */
function loadData() {

  fetch(`${API}?key=${API_KEY}`)
  .then(r => r.json())
  .then(data => {

    workers = data.workers || [];

    renderWorkers();
    renderDropdown();
    renderHistory(data.tests || []);
  });
}

/* =========================
   SAVE WORKER
========================= */
function saveWorker() {

  const payload = {
    key: API_KEY,
    action: "worker_save",
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    department: document.getElementById("dept").value
  };

  fetch(API, {
    method: "POST",
    body: JSON.stringify(payload)
  }).then(() => loadData());
}

/* =========================
   SUBMIT TEST
========================= */
function submitTest() {

  const payload = {
    key: API_KEY,
    action: "test_insert",
    worker_id: workers[document.getElementById("workerSelect").value].worker_id,
    bac: document.getElementById("bac").value
  };

  fetch(API, {
    method: "POST",
    body: JSON.stringify(payload)
  }).then(() => loadData());
}

/* =========================
   RENDER WORKERS
========================= */
function renderWorkers() {

  let html = "<table><tr><th>👤 Name</th><th>📱 HP</th></tr>";

  workers.forEach(w => {
    html += `<tr><td>${w.name}</td><td>${w.phone}</td></tr>`;
  });

  html += "</table>";

  document.getElementById("workerList").innerHTML = html;
}

/* =========================
   DROPDOWN
========================= */
function renderDropdown() {

  let html = "";

  workers.forEach((w, i) => {
    html += `<option value="${i}">👷 ${w.name}</option>`;
  });

  document.getElementById("workerSelect").innerHTML = html;
}

/* =========================
   HISTORY
========================= */
function renderHistory(data) {

  let html = "<table><tr><th>👤 Name</th><th>🍺 BAC</th><th>📌 Status</th><th>⚙ Action</th></tr>";

  data.forEach((t, i) => {

    const cls = t.status === "FAIL" ? "fail" : "pass";

    html += `
      <tr class="${cls}">
        <td>${t.name}</td>
        <td>${t.bac}</td>
        <td>${t.status}</td>
        <td>
          <button onclick="printPDF()">📄 PDF</button>
          <button onclick="shareWA(${i})">💬 WA</button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("history").innerHTML = html;
}

/* =========================
   PRINT PDF
========================= */
function printPDF() {
  window.print();
}

/* =========================
   WHATSAPP SHARE
========================= */
function shareWA(i) {

  fetch(`${API}?key=${API_KEY}`)
  .then(r => r.json())
  .then(data => {

    const t = data.tests[i];

    const msg =
`🧪 HSE Alcohol Test Result
👤 Name: ${t.name}
🍺 BAC: ${t.bac}
📌 Status: ${t.status}

Powered by Pausbiru7`;

    const url = `https://wa.me/${t.phone}?text=${encodeURIComponent(msg)}`;

    window.open(url, "_blank");
  });
}

loadData();

</script>

</body>
</html>
