<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HSE Alcohol Test System</title>

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:5px;
  border:none;
}

button {
  background:#2563eb;
  color:white;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th {
  border:1px solid #334155;
  padding:6px;
  font-size:12px;
}

.pass { background:green; }
.fail { background:red; }

.small {
  font-size:11px;
  opacity:0.8;
}
</style>
</head>

<body>

<h2>HSE Alcohol Test System</h2>

<div class="grid">

<!-- WORKER -->
<div class="card">
<h3>Worker Management</h3>

<input id="name" placeholder="Nama">
<input id="phone" placeholder="No HP (WA)">
<input id="dept" placeholder="Department">

<button onclick="saveWorker()">Save Worker</button>

<h4>Worker List</h4>
<div id="workerList"></div>
</div>

<!-- TEST -->
<div class="card">
<h3>Alcohol Test Input</h3>

<select id="workerSelect"></select>
<input id="bac" placeholder="BAC Value">

<button onclick="submitTest()">Submit Test</button>
</div>

</div>

<!-- HISTORY -->
<div class="card" style="margin-top:15px;">
<h3>History</h3>
<button onclick="loadData()">Refresh</button>
<div id="history"></div>
</div>

<script>

const API = "YOUR_GAS_URL";

let workers = [];
let editIndex = null;

/* ================= WORKERS ================= */

function saveWorker() {
  const payload = {
    type:"worker",
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    dept:document.getElementById("dept").value,
    index:editIndex
  };

  fetch(API,{
    method:"POST",
    body:JSON.stringify(payload)
  }).then(()=> {
    editIndex=null;
    loadData();
  });
}

/* ================= TEST ================= */

function submitTest() {
  const payload = {
    type:"test",
    workerIndex:document.getElementById("workerSelect").value,
    bac:document.getElementById("bac").value
  };

  fetch(API,{
    method:"POST",
    body:JSON.stringify(payload)
  }).then(loadData);
}

/* ================= LOAD ================= */

function loadData() {
  fetch(API)
  .then(r=>r.json())
  .then(data=>{

    workers = data.workers || [];

    // worker dropdown
    let opt = "";
    workers.forEach((w,i)=>{
      opt += `<option value="${i}">${w.name}</option>`;
    });
    document.getElementById("workerSelect").innerHTML = opt;

    // worker list
    let whtml = "<table><tr><th>Name</th><th>HP</th></tr>";
    workers.forEach(w=>{
      whtml += `<tr><td>${w.name}</td><td>${w.phone}</td></tr>`;
    });
    whtml += "</table>";
    document.getElementById("workerList").innerHTML = whtml;

    // history
    let h = "<table><tr><th>Name</th><th>BAC</th><th>Status</th><th>Action</th></tr>";

    (data.tests || []).forEach((t,i)=>{

      const cls = t.bac > 0 ? "fail" : "pass";

      h += `
      <tr class="${cls}">
        <td>${t.name}</td>
        <td>${t.bac}</td>
        <td>${t.bac > 0 ? "FAIL":"PASS"}</td>
        <td>
          <button onclick="printPDF()">PDF</button>
          <button onclick="shareWA(${i})">WA</button>
        </td>
      </tr>`;
    });

    h += "</table>";
    document.getElementById("history").innerHTML = h;
  });
}

/* ================= PDF ================= */

function printPDF() {
  window.print();
}

/* ================= WA SHARE ================= */

function shareWA(i) {
  fetch(API)
  .then(r=>r.json())
  .then(data=>{
    const t = data.tests[i];

    const msg =
`HSE Alcohol Test Result
Name: ${t.name}
BAC: ${t.bac}
Status: ${t.bac > 0 ? "FAIL":"PASS"}`;

    const url = `https://wa.me/${t.phone}?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
  });
}

loadData();

</script>

</body>
</html>
