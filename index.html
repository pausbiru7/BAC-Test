<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>🧪 HSE Alcohol Test System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button {
  background:#2563eb;
  color:white;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #334155;
  padding:6px;
  font-size:12px;
}

.pass { background:green; }
.fail { background:red; }

.footer {
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-top:20px;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginBox" class="card">
  <h2>🔐 HSE Login System</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none;">

<!-- HEADER -->
<div class="card">
  <h2>🧪 HSE Alcohol Test System</h2>
  <small>Real-time Workforce Compliance & Safety Monitoring</small>
</div>

<!-- WORKER + TEST -->
<div class="grid">

  <div class="card">
    <h3>👷 Worker Management</h3>

    <input id="name" placeholder="Nama">
    <input id="phone" placeholder="No HP">
    <input id="dept" placeholder="Department">

    <button onclick="saveWorker()">Save Worker</button>

    <div id="workerList"></div>
  </div>

  <div class="card">
    <h3>🧪 Alcohol Test Input</h3>

    <select id="workerSelect"></select>
    <input id="bac" placeholder="BAC Value">

    <button onclick="submitTest()">Submit</button>
  </div>

</div>

<!-- HISTORY -->
<div class="card">
  <h3>📊 Test History</h3>
  <button onclick="loadData()">Refresh</button>
  <div id="history"></div>
</div>

<!-- KPI -->
<div class="card">
  <h3>📈 HSE KPI Dashboard</h3>

  <div id="kpiBox"></div>

  <canvas id="chart" width="400" height="200"></canvas>

  <br><br>

  <button onclick="generatePDF()" id="pdfBtn">📄 Generate HSE Report</button>
</div>

<!-- FOOTER -->
<div class="footer">
  Powered by Pausbiru7
</div>

</div>

<script>

const API = "YOUR_GAS_URL";
const API_KEY = "HSE-ALCOHOL-2026";

let workers = [];
let currentRole = null;

/* ================= LOGIN ================= */
function login() {

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if (u === "admin" && p === "admin123") currentRole = "ADMIN";
  else if (u === "operator" && p === "op123") currentRole = "OPERATOR";
  else if (u === "viewer" && p === "view123") currentRole = "VIEWER";
  else return alert("Login gagal");

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";

  applyRoleUI();
  loadData();
}

/* ================= ROLE CONTROL ================= */
function applyRoleUI() {

  if (currentRole === "OPERATOR") {
    document.querySelector(".card:nth-last-child(1)").style.display = "none";
  }

  if (currentRole === "VIEWER") {
    document.querySelectorAll(".grid .card")[0].style.display = "none";
    document.querySelectorAll(".grid .card")[1].style.display = "none";
  }
}

/* ================= LOAD DATA ================= */
function loadData() {

  fetch(`${API}?key=${API_KEY}`)
  .then(r => r.json())
  .then(data => {

    workers = data.workers || [];

    renderWorkers();
    renderDropdown();
    renderHistory(data.tests || []);
    renderKPI(data.tests || []);
  });
}

/* ================= WORKER ================= */
function saveWorker() {

  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      key: API_KEY,
      action: "worker_save",
      name: name.value,
      phone: phone.value,
      department: dept.value
    })
  }).then(()=>loadData());
}

/* ================= TEST ================= */
function submitTest() {

  fetch(API, {
    method:"POST",
    body: JSON.stringify({
      key: API_KEY,
      action: "test_insert",
      worker_id: workers[workerSelect.value].worker_id,
      bac: bac.value
    })
  }).then(()=>loadData());
}

/* ================= RENDER ================= */
function renderWorkers() {

  let html = "<table><tr><th>Name</th><th>Phone</th></tr>";

  workers.forEach(w=>{
    html += `<tr><td>${w.name}</td><td>${w.phone}</td></tr>`;
  });

  html += "</table>";
  workerList.innerHTML = html;
}

function renderDropdown() {

  workerSelect.innerHTML = workers.map((w,i)=>
    `<option value="${i}">👷 ${w.name}</option>`
  ).join("");
}

function renderHistory(data) {

  history.innerHTML = `
  <table>
    <tr><th>Name</th><th>BAC</th><th>Status</th></tr>
    ${data.map(t=>`
      <tr class="${t.status==='FAIL'?'fail':'pass'}">
        <td>${t.name}</td>
        <td>${t.bac}</td>
        <td>${t.status}</td>
      </tr>`).join("")}
  </table>`;
}

/* ================= KPI ENGINE ================= */
function renderKPI(data) {

  let pass=0, fail=0;
  let daily={};

  data.forEach(t=>{

    if(t.status==="FAIL") fail++;
    else pass++;

    let date = t.timestamp
      ? new Date(t.timestamp).toISOString().slice(0,10)
      : null;

    if(date) daily[date]=(daily[date]||0)+1;
  });

  let total = data.length;
  let compliance = total?((pass/total)*100).toFixed(2):0;

  kpiBox.innerHTML = `
  <table>
    <tr><th>Total</th><th>PASS</th><th>FAIL</th><th>Compliance</th></tr>
    <tr>
      <td>${total}</td>
      <td>${pass}</td>
      <td>${fail}</td>
      <td>${compliance}%</td>
    </tr>
  </table>`;

  drawChart(daily);
}

/* ================= CHART ================= */
function drawChart(daily) {

  const c = chart.getContext("2d");
  c.clearRect(0,0,400,200);

  let keys = Object.keys(daily).slice(-7);
  let vals = keys.map(k=>daily[k]);
  let max = vals.length?Math.max(...vals):1;

  keys.forEach((k,i)=>{

    let h = (daily[k]/max)*150;

    c.fillStyle="#2563eb";
    c.fillRect(i*50,150-h,30,h);

    c.fillStyle="#fff";
    c.fillText(daily[k],i*50,140-h);
  });
}

/* ================= PDF ================= */
function generatePDF() {

  if(currentRole!=="ADMIN") return alert("Denied");

  window.print();
}

/* ================= PWA ================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
