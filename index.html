<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>🧪 HSE Safety Intelligence System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body {
  font-family: Arial;
  background:#0b1220;
  color:#fff;
  margin:0;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button {
  background:#2563eb;
  color:white;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #334155;
  padding:6px;
  font-size:12px;
}

.pass { background:green; }
.fail { background:red; }

.footer {
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-top:20px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>🔐 HSE Login</h2>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
  <h2>🧪 HSE Safety Intelligence System</h2>
</div>

<div class="grid">

  <div class="card">
    <h3>👷 Worker</h3>
    <input id="name" placeholder="Nama">
    <input id="phone" placeholder="No HP">
    <input id="dept" placeholder="Department">
    <button onclick="saveWorker()">Save</button>
    <div id="workerList"></div>
  </div>

  <div class="card">
    <h3>🧪 Test</h3>
    <select id="workerSelect"></select>
    <input id="bac" placeholder="Value">
    <button onclick="submitTest()">Submit</button>
  </div>

</div>

<!-- HISTORY -->
<div class="card">
  <h3>📊 History</h3>
  <button onclick="loadData()">Refresh</button>
  <div id="history"></div>
</div>

<!-- KPI + INTELLIGENCE -->
<div class="card">
  <h3>📈 Intelligence Dashboard</h3>

  <div id="kpiBox"></div>

  <canvas id="chart" width="400" height="200"></canvas>
</div>

</div>

<div class="footer">
Powered by Pausbiru7
</div>

<script>

const API = "YOUR_GAS_URL";
const API_KEY = "HSE-ALCOHOL-2026";

let workers = [];
let currentRole = null;
let isLoading = false;

/* ================= LOGIN ================= */
function login(){

  const u=user.value;
  const p=pass.value;

  if(u==="admin" && p==="admin123") currentRole="ADMIN";
  else if(u==="operator" && p==="op123") currentRole="OPERATOR";
  else if(u==="viewer" && p==="view123") currentRole="VIEWER";
  else return alert("Login gagal");

  loginBox.style.display="none";
  app.style.display="block";

  loadData();
}

/* ================= AUTO REFRESH ================= */
setInterval(()=>loadData(),5000);

/* ================= LOAD DATA ================= */
function loadData(){

  if(isLoading) return;
  isLoading=true;

  fetch(`${API}?key=${API_KEY}`)
  .then(r=>r.json())
  .then(data=>{

    workers=data.workers||[];

    renderWorkers();
    renderDropdown();
    renderHistory(data.tests||[]);
    renderKPI(data.tests||[]);

    isLoading=false;
  });
}

/* ================= RULE ENGINE ================= */
function getStatus(val){
  return parseFloat(val) === 0 ? "PASS" : "FAIL";
}

/* ================= WORKER ================= */
function saveWorker(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      key:API_KEY,
      action:"worker_save",
      name:name.value,
      phone:phone.value,
      department:dept.value
    })
  }).then(()=>loadData());
}

/* ================= TEST ================= */
function submitTest(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      key:API_KEY,
      action:"test_insert",
      worker_id:workers[workerSelect.value].worker_id,
      bac:bac.value
    })
  }).then(()=>loadData());
}

/* ================= ALERT ENGINE ================= */
function triggerAlert(t){

  if(getStatus(t.bac)==="PASS") return;

  const msg =
`🚨 HSE ALERT
Name: ${t.name}
Dept: ${t.department}
Value: ${t.bac}
Status: FAIL`;

  const url=`https://wa.me/${t.phone||""}?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}

/* ================= HISTORY ================= */
function renderHistory(data){

  history.innerHTML =
  "<table><tr><th>Name</th><th>Value</th><th>Status</th><th>Alert</th></tr>" +

  data.map(t=>{

    const status=getStatus(t.bac);

    if(status==="FAIL") triggerAlert(t);

    return `
      <tr class="${status==='FAIL'?'fail':'pass'}">
        <td>${t.name}</td>
        <td>${t.bac}</td>
        <td>${status}</td>
        <td>${status==="FAIL"?"🚨 AUTO":""}</td>
      </tr>
    `;
  }).join("") +

  "</table>";
}

/* ================= KPI + INTELLIGENCE ENGINE ================= */
function renderKPI(data){

  let pass=0, fail=0;

  let deptMap={};
  let userMap={};
  let hourlyMap={};

  data.forEach(t=>{

    let status=getStatus(t.bac);

    if(status==="PASS") pass++;
    else fail++;

    /* DEPT RISK */
    let d=t.department||"UNKNOWN";
    deptMap[d]=deptMap[d]||{pass:0,fail:0};
    deptMap[d][status.toLowerCase()]++;

    /* USER BEHAVIOR */
    userMap[t.name]=userMap[t.name]||{pass:0,fail:0};
    userMap[t.name][status.toLowerCase()]++;

    /* ANOMALY DETECTION */
    let h=t.timestamp?new Date(t.timestamp).getHours():null;
    if(h!==null){
      hourlyMap[h]=(hourlyMap[h]||0)+1;
    }
  });

  let total=data.length;
  let compliance=total?((pass/total)*100).toFixed(2):0;

  /* KPI CORE */
  let html=`
  <table>
    <tr><th>Total</th><th>PASS</th><th>FAIL</th><th>Compliance</th></tr>
    <tr>
      <td>${total}</td>
      <td>${pass}</td>
      <td>${fail}</td>
      <td>${compliance}%</td>
    </tr>
  </table>
  `;

  /* RISK ENGINE */
  html+=`
  <br><table>
    <tr><th>Department</th><th>FAIL</th></tr>
    ${Object.keys(deptMap).map(d=>`
      <tr>
        <td>${d}</td>
        <td>${deptMap[d].fail||0}</td>
      </tr>
    `).join("")}
  </table>
  `;

  /* USER ANALYTICS */
  html+=`
  <br><table>
    <tr><th>User</th><th>FAIL</th></tr>
    ${Object.keys(userMap).map(u=>`
      <tr>
        <td>${u}</td>
        <td>${userMap[u].fail||0}</td>
      </tr>
    `).join("")}
  </table>
  `;

  /* ANOMALY */
  html+=`
  <br><table>
    <tr><th>Hour</th><th>Activity</th></tr>
    ${Object.keys(hourlyMap).map(h=>`
      <tr>
        <td>${h}:00</td>
        <td>${hourlyMap[h]}</td>
      </tr>
    `).join("")}
  </table>
  `;

  kpiBox.innerHTML=html;

  drawChart(hourlyMap);
}

/* ================= CHART ================= */
function drawChart(daily){

  const c=chart.getContext("2d");
  c.clearRect(0,0,400,200);

  let keys=Object.keys(daily).slice(-7);
  let vals=keys.map(k=>daily[k]);
  let max=vals.length?Math.max(...vals):1;

  keys.forEach((k,i)=>{

    let h=(daily[k]/max)*150;

    c.fillStyle="#2563eb";
    c.fillRect(i*50,150-h,30,h);

    c.fillStyle="#fff";
    c.fillText(daily[k],i*50,140-h);
  });
}

/* ================= PWA ================= */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
