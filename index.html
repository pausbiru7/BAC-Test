<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>BAC Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 2rem;
      background: #f8fafc;
      color: #0f172a;
    }
    h1 {
      margin-bottom: 0.5rem;
    }
    button {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      border: 1px solid #1d4ed8;
      background: #1d4ed8;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover {
      background: #1e40af;
    }
    pre {
      margin-top: 1rem;
      padding: 1rem;
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 0.5rem;
      max-height: 400px;
      overflow: auto;
      font-size: 0.8rem;
    }
    .info {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <h1>BAC Test Simple Frontend</h1>
  <p class="info">
    Tombol di bawah akan memanggil Google Apps Script (<code>getInitialData</code>) dan menampilkan JSON yang dikembalikan.
  </p>

  <button id="load">Load Initial Data dari GAS</button>
  <pre id="output">Klik tombol di atas untuk mulai.</pre>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx5UI9G0sQIFgiw6Zt88fdoLM3jwtMUqfFeo6rdGqqo4uNGKE_9Jmd1lXTGUJi4qFeq8w/exec';

    document.getElementById('load').addEventListener('click', async () => {
      const out = document.getElementById('output');
      out.textContent = 'Loading...';
      try {
        const res = await fetch(GAS_URL + '?action=getInitialData');
        if (!res.ok) {
          const text = await res.text().catch(() => '');
          throw new Error('HTTP ' + res.status + ': ' + (text || 'Gagal memanggil GAS'));
        }
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        out.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
